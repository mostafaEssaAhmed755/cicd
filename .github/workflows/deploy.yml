name: Deploy

on:
  workflow_run:
    workflows: ["Build Docker Image"]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Prepare Server
        run: |
          mkdir -p /opt/cicd

          rsync -av --delete docker-compose.production.yml /opt/cicd/
          rsync -av --delete docker/ /opt/cicd/docker/
          rsync -av --delete scripts/ /opt/cicd/scripts/

          chmod +x /opt/cicd/scripts/*.sh

      - name: Generate .env
        run: |
          /opt/cicd/scripts/generate-env.sh

      - name: Set image tag
        run: echo "IMAGE_TAG=sha-${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Deploy
        run: |
          /opt/cicd/scripts/deploy.sh
