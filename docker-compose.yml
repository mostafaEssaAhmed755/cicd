services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: cicd_app
    working_dir: /var/www/html
    volumes:
      - ./src:/var/www/html
    networks:
      - laravel

  worker:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: cicd_worker
    working_dir: /var/www/html
    volumes:
      - ./src:/var/www/html
    command: php artisan queue:work
    depends_on:
      - app
    networks:
      - laravel

  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: cicd_scheduler
    working_dir: /var/www/html
    volumes:
      - ./src:/var/www/html
    command: php artisan schedule:work
    depends_on:
      - app
    networks:
      - laravel

  nginx:
    image: nginx:alpine
    container_name: cicd_nginx
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - laravel

  mysql:
    image: mysql:8
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: cicd
      MYSQL_USER: laravel
      MYSQL_PASSWORD: root
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - laravel

  redis:
    image: redis:alpine
    container_name: ecommerce_redis
    ports:
      - "6379:6379"
    networks:
      - laravel

networks:
  laravel:

volumes:
  mysql_data:
